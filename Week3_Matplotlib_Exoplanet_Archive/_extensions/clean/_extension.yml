title: clean
author: Grant McDermott
version: 1.4.1
quarto-required: ">=1.3.0"
contributes:
  formats:
    revealjs:
      theme: [default, clean.scss]
      menu:
        side: left
      slide-number: true
      width: 1280
      height: 720
      margin: 0.05
      date-format: long
      html-math-method:
        method: mathjax
        url: "https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js"
      include-before-body:
        - text: |
            <script src="mathjax-config.js"></script>
      include-after-body:
        - text: |
            <script>
            (() => {
              const query = new URLSearchParams(window.location.search);
              const raw = query.get("slide-bounds") ?? query.get("bounds");
              const queryValue = raw == null ? null : !["0", "false", "off", "no"].includes(raw.toLowerCase());
              const setBounds = (on) => {
                document.body.classList.toggle("show-slide-bounds", on);
                document.querySelector(".reveal")?.classList.toggle("show-slide-bounds", on);
              };
              const toggleBounds = () => setBounds(!document.body.classList.contains("show-slide-bounds"));
              const editable = (el) => el?.isContentEditable || ["INPUT", "TEXTAREA", "SELECT"].includes(el?.tagName);
              const init = () => {
                const initial = queryValue ?? document.body.classList.contains("show-slide-bounds");
                setBounds(initial);
                document.addEventListener("keydown", (event) => {
                  if (event.key?.toLowerCase() === "e" && !event.metaKey && !event.ctrlKey && !event.altKey && !editable(event.target)) {
                    event.preventDefault();
                    toggleBounds();
                  }
                });
              };
              document.readyState === "loading" ? document.addEventListener("DOMContentLoaded", init) : init();
            })();
            </script>
      format-resources:
        - mathjax-config.js
